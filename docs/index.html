<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AlphaZero 五子棋</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="board-pane" aria-label="棋盘">
        <div class="topbar">
          <div>
            <p class="eyebrow">10×10 五子棋 · 本地浏览器推理</p>
            <h1>AlphaZero 五子棋</h1>
          </div>
          <div class="status-pill loading" id="statusPill" role="status" aria-live="polite">加载模型</div>
        </div>

        <div class="load-line" id="loadLine" aria-live="polite">
          <div class="activity-mark" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
          <div class="load-copy">
            <strong>模型加载</strong>
            <span id="loadText">准备加载</span>
          </div>
          <strong class="load-percent" id="loadPercent">0%</strong>
          <div class="load-bar"><span id="loadBar"></span></div>
        </div>

        <div class="board-area">
          <div class="eval-bar" title="黑方胜率">
            <div class="eval-black" id="evalBlack"></div>
            <span class="eval-label" id="evalLabel">-</span>
          </div>
          <div class="board-wrap">
            <div class="coordinates columns" id="colCoords"></div>
            <div class="board-row">
              <div class="coordinates rows" id="rowCoords"></div>
              <div class="board-stage">
                <div class="board" id="board" aria-label="棋盘" role="grid"></div>
                <div class="compute-overlay" id="computeOverlay" aria-live="polite" hidden>
                  <div class="compute-card">
                    <div class="compute-mark" aria-hidden="true">
                      <span></span><span></span><span></span>
                    </div>
                    <div class="compute-copy">
                      <strong id="computeTitle">AI 思考中</strong>
                      <span id="computeDetail">MCTS 正在扩展搜索树</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="overlay-controls">
          <div class="overlay-toolbox">
            <div class="segmented overlay-seg" role="group" aria-label="叠加层">
              <button class="segment active" data-overlay="none" type="button">棋盘</button>
              <button class="segment" data-overlay="search" type="button">深算</button>
              <button class="segment" data-overlay="policy" type="button">策略</button>
            </div>
            <p class="overlay-help">
              深算=MCTS 搜索后重点关注；策略=模型自学出的落点概率。
            </p>
          </div>
          <label class="pv-toggle">
            <input id="pvToggle" type="checkbox" checked />
            <span>后续路线</span>
            <small>数字表示预测第几步</small>
          </label>
        </div>

        <section class="panel tree-panel">
          <div class="panel-title">
            <span>MCTS 搜索树</span>
            <strong id="treeCount">0</strong>
          </div>
          <div class="tree-legend" aria-label="MCTS 图例">
            <span><i class="legend-line main"></i>主线</span>
            <span><i class="legend-line branch"></i>候选分支</span>
            <span><i class="legend-dot"></i>模拟局面</span>
          </div>
          <svg id="treeSvg" class="tree-svg" viewBox="0 0 760 320" role="img" aria-label="MCTS 搜索树"></svg>
        </section>
      </section>

      <aside class="side-pane">
        <section class="panel controls">
          <div class="panel-title">
            <span>对局设置</span>
            <strong id="sideLabel">执黑</strong>
          </div>
          <div class="segmented" role="group" aria-label="执棋">
            <button class="segment active" data-side="black" type="button">我执黑</button>
            <button class="segment" data-side="white" type="button">我执白</button>
          </div>

          <label class="slider-row">
            <span>深算次数</span>
            <strong id="simValue">256</strong>
            <input id="simSlider" type="range" min="16" max="384" step="16" value="256" />
          </label>

          <div class="actions">
            <button id="newGame" type="button">新对局</button>
            <button class="secondary" id="undo" type="button">悔棋</button>
            <button class="secondary" id="analyze" type="button">提示</button>
          </div>
        </section>

        <section class="panel stats">
          <div class="panel-title">
            <span>局面评估</span>
            <strong id="winProb">-</strong>
          </div>
          <div class="win-meter" aria-hidden="true">
            <span class="meter-label black">黑</span>
            <div class="meter-track"><span id="winMeterBlack"></span></div>
            <span class="meter-label white">白</span>
          </div>
          <dl>
            <div><dt>手数</dt><dd id="moves">0</dd></div>
            <div><dt>轮到</dt><dd id="turn">-</dd></div>
            <div><dt>深算</dt><dd id="statSims">-</dd></div>
            <div><dt>耗时</dt><dd id="statTime">-</dd></div>
          </dl>
          <p class="source" id="evalSource">-</p>
          <canvas id="evalChart" height="120"></canvas>
        </section>

        <section class="panel candidates">
          <div class="panel-title">
            <span>候选点</span>
            <strong id="policyCount">0</strong>
          </div>
          <p class="source" id="overlayNote">占比=深算时花在这个点上的比例；策略=模型自学出的落点概率，不含人工规则</p>
          <table>
            <thead>
              <tr><th>点位</th><th>模拟</th><th>占比</th><th>策略</th><th>胜率</th></tr>
            </thead>
            <tbody id="candBody"></tbody>
          </table>
        </section>

        <section class="panel history">
          <div class="panel-title">
            <span>棋谱</span>
            <strong id="historyCount">0</strong>
          </div>
          <ol id="historyList"></ol>
        </section>
      </aside>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>

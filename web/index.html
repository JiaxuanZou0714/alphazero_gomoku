<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gomoku AI Board</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="board-pane" aria-label="Gomoku board">
        <div class="topbar">
          <div>
            <p class="eyebrow">10x10 Gomoku</p>
            <h1>AlphaZero sparring board</h1>
          </div>
          <div class="status-pill" id="statusPill">Loading</div>
        </div>

        <div class="board-wrap">
          <div class="coordinates columns" id="colCoords"></div>
          <div class="board-row">
            <div class="coordinates rows" id="rowCoords"></div>
            <div class="board" id="board" aria-label="Board" role="grid"></div>
          </div>
        </div>
      </section>

      <aside class="side-panel" aria-label="Game controls">
        <section class="panel-section">
          <div class="section-heading">
            <span>Side</span>
            <strong id="sideLabel">Black</strong>
          </div>
          <div class="segmented" role="group" aria-label="Choose side">
            <button class="segment active" data-side="black" type="button">Black</button>
            <button class="segment" data-side="white" type="button">White</button>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-heading">
            <span>Search</span>
            <strong><span id="simValue">64</span> sims</strong>
          </div>
          <input id="simSlider" type="range" min="8" max="160" step="8" value="64" />
          <div class="ticks">
            <span>fast</span>
            <span>strong</span>
          </div>
        </section>

        <section class="panel-section actions">
          <button class="primary" id="newGame" type="button">New game</button>
          <button class="secondary" id="refresh" type="button">Refresh</button>
        </section>

        <section class="panel-section stats">
          <div>
            <span>Moves</span>
            <strong id="moves">0</strong>
          </div>
          <div>
            <span>Turn</span>
            <strong id="turn">Black</strong>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-heading">
            <span>AI candidates</span>
            <strong id="policyCount">0</strong>
          </div>
          <ol class="policy-list" id="policyList"></ol>
        </section>

        <section class="panel-section history-section">
          <div class="section-heading">
            <span>Recent moves</span>
            <strong id="historyCount">0</strong>
          </div>
          <ol class="history-list" id="historyList"></ol>
        </section>
      </aside>
    </main>

    <div class="toast" id="toast" hidden></div>
    <script src="/app.js"></script>
  </body>
</html>
